<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 15px; }
        .item { background: white; border-radius: 10px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .price { color: green; font-weight: bold; }
        .btn { background: #24a1de; color: white; border: none; width: 100%; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h2 style="text-align:center;">ጣና ዲጂታል ገበያ</h2>
    
    <div class="item">
        <h3>ዘመናዊ ሶፋ</h3>
        <p class="price">45,000 ETB</p>
        <button class="btn" onclick="sendData('ሶፋ')">አሁኑኑ እዘዝ</button>
    </div>

    <div class="item">
        <h3>ስማርት ቲቪ 55"</h3>
        <p class="price">62,000 ETB</p>
        <button class="btn" onclick="sendData('ቲቪ')">አሁኑኑ እዘዝ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        function sendData(name) {
            tg.sendData(name); // ለቦቱ መረጃ ይልካል
        }
    </script>
</body>
</html>
