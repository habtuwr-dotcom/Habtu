<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background: #f8f9fa; margin: 0; padding: 15px; }
        .header { text-align: center; color: #2c3e50; margin-bottom: 20px; }
        .product-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .card img { width: 100%; height: 130px; object-fit: cover; }
        .card-body { padding: 10px; text-align: center; }
        .title { font-weight: bold; font-size: 14px; height: 35px; overflow: hidden; }
        .price { color: #27ae60; font-weight: bold; margin: 5px 0; }
        .buy-btn { background: #3498db; color: white; border: none; padding: 8px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        .buy-btn:active { background: #2980b9; }
    </style>
</head>
<body>

<div class="header">
    <h3>ጣና ገበያ 🌊</h3>
    <small>ባህር ዳር - ጥራት መለያችን ነው</small>
</div>

<div class="product-list">
    <div class="card">
        <img src="https://images.unsplash.com/photo-1540574163026-643ea20ade25?w=400">
        <div class="card-body">
            <div class="title">ስማርት ቲቪ 55"</div>
            <div class="price">62,000 ETB</div>
            <button class="buy-btn" onclick="send('ቲቪ (62,000 ETB)')">እዘዝ</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77?w=400">
        <div class="card-body">
            <div class="title">አዲዳስ ጫማ</div>
            <div class="price">4,500 ETB</div>
            <button class="buy-btn" onclick="send('ጫማ (4,500 ETB)')">እዘዝ</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1585241936939-be4099591252?w=400">
        <div class="card-body">
            <div class="title">ዘመናዊ ሶፋ</div>
            <div class="price">55,000 ETB</div>
            <button class="buy-btn" onclick="send('ሶፋ (55,000 ETB)')">እዘዝ</button>
        </div>
    </div>
    
    <div class="card">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400">
        <div class="card-body">
            <div class="title">ስማርት ሰዓት</div>
            <div class="price">3,800 ETB</div>
            <button class="buy-btn" onclick="send('ሰዓት (3,800 ETB)')">እዘዝ</button>
        </div>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    function send(item) {
        tg.sendData(item);
    }
</script>

</body>
</html>
